<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE-edge">
        <meta name="Viewport" content="width=device-width,initial-scale=1.0">
        <title>Slither /Snake Game (Design by Saritha Bhaskar)</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
        <div id="scorebox" style="color: white;">Score: 0</div>
        <div id="hiscorebox" style="color: white;">High Score: 0</div>
        <div id="playArea"></div>
        </div>
        <div class="controls">
        <button onclick="moveUp()">⬆️</button>
        <button onclick="moveDown()">⬇️</button>
        <button onclick="moveLeft()">⬅️</button>
        <button onclick="moveRight()">➡️</button>
        </div>
        <script src="script.js"></script>
    </body>
</html>
